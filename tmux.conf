# Ctrl-space as prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


set -g mouse on
set -g default-terminal "screen-256color"

# Use Vim-style keys for pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Easier splits (opens in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Update bindings for 'Selection' to feel like Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# tmux 3.2+: use copy-command for cleaner clipboard sync
set -g copy-command "xclip -selection clipboard -i 2>/dev/null || pbcopy 2>/dev/null || wl-copy 2>/dev/null"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$copy-command"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$copy-command"


# Remove delay when pressing esc
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Resize panes with H, J, K, L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Better color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"